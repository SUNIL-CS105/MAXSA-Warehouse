<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAXSA Warehouse Map</title>

  <!-- Firebase CDN (v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-container">
    <div class="login-box">
      <h2>Warehouse Login</h2>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Login</button>
      <a id="show-signup">New User? Sign Up</a>
    </div>
  </div>

  <!-- SIGNUP -->
  <div id="signup-container" style="display:none;">
    <div class="login-box">
      <h2>Warehouse Sign Up</h2>
      <input type="email" id="signup-email" placeholder="Email">
      <input type="password" id="signup-password" placeholder="Password">
      <button id="signup-btn">Sign Up</button>
      <a id="show-login">Already have an account? Login</a>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading-indicator">Loading warehouse data...</div>

  <!-- APP HEADER -->
  <div id="app-header" class="app-header" style="display:none;">
    <div class="app-header-left">
      <div class="app-title">MAXSA</div>
    </div>

    <div class="app-header-right">
      <button id="edit-mode-btn" class="header-btn">Edit: ON</button>
      <button id="excel-export-btn" class="header-btn">Download Excel</button>
      <button id="inventory-summary-btn" class="header-btn">Inventory Summary</button>
      <button id="history-btn" class="header-btn">History</button>
      <button id="logout-btn" class="header-btn">Logout</button>
    </div>
  </div>

  <!-- APP -->
  <div id="warehouse-app" style="display:none;">
    <div id="app-stage">
      <div id="warehouse-container">
        <div class="grid-stack"></div>

        <div id="add-product-panel" class="control-panel">
          <div style="margin-bottom: 8px;">Add Product</div>
          <input type="text" id="new-item" placeholder="Item #" />
          <input type="number" id="new-q" placeholder="Quantity" min="1" />
          <button id="add-product-btn">➕ Add New Product</button>
          <div class="view-only-hint">Turn Edit OFF to prevent moving/splitting/adding.</div>
        </div>
      </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="history-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3 id="history-modal-title">Warehouse Movement History</h3>
        <div id="history-output"></div>
      </div>
    </div>

    <!-- INVENTORY SUMMARY MODAL -->
    <div id="inventory-summary-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3>Inventory Summary</h3>
        <div id="inventory-summary-modal-output"></div>
      </div>
    </div>
  </div>

  <!-- SCRIPT ORDER -->
  <script src="js/config/firebase.js"></script>
  <script src="js/firebaseDB.js"></script>
  <script src="js/pallet.js"></script>
  <script src="js/warehouse.js"></script>
  <script src="js/events.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
