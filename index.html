<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAXSA Warehouse Map</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="login-container">
    <div class="login-box">
      <h2>Warehouse Login</h2>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button type="button" id="login-btn">Login</button>
      <a id="show-signup">New User? Sign Up</a>
    </div>
  </div>

  <div id="signup-container" style="display:none;">
    <div class="login-box">
      <h2>Warehouse Sign Up</h2>
      <input type="text" id="signup-company" placeholder="Company's Full Name">
      <input type="email" id="signup-email" placeholder="Email">
      <input type="password" id="signup-password" placeholder="Password">
      <button type="button" id="signup-btn">Sign Up</button>
      <a id="show-login">Already have an account? Login</a>
    </div>
  </div>

  <div id="loading-indicator">Loading warehouse data...</div>

  <div id="warehouse-app" style="display:none;">
    <div id="app-stage">
      <div id="warehouse-container">

        <div id="app-header" class="map-header">
          <div class="app-header-left">
            <div class="app-title">MAXSA</div>
          </div>

          <div class="app-header-right">
            <button type="button" id="training-btn" class="header-btn">Training</button>
            <button type="button" id="edit-mode-btn" class="header-btn">Edit: ON</button>
            <button type="button" id="excel-export-btn" class="header-btn">Download Excel</button>
            <button type="button" id="inventory-summary-btn" class="header-btn">Inventory Summary</button>
            <button type="button" id="history-btn" class="header-btn">History</button>
            <button type="button" id="logout-btn" class="header-btn">Logout</button>
          </div>
        </div>

        <div class="grid-stack"></div>

        <div id="add-product-panel" class="control-panel">
          <div style="margin-bottom: 8px;">Add Product</div>
          <input type="text" id="new-item" placeholder="Item #" />
          <input type="number" id="new-q" placeholder="Quantity" min="0.01" step="any" />
          <button type="button" id="add-product-btn">➕ Add New Product</button>
        </div>

        <button type="button" id="undo-btn" title="Undo last move">UNDO</button>
      </div>
    </div>

    <div id="history-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3 id="history-modal-title">Warehouse Movement History</h3>
        <div id="history-output"></div>
      </div>
    </div>

    <div id="inventory-summary-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3>Inventory Summary</h3>
        <div id="inventory-summary-modal-output"></div>
      </div>
    </div>

    <div id="training-modal" class="modal">
      <div class="modal-content training-modal-content">
        <span class="close-btn" id="training-close-btn">&times;</span>
        <h3 id="training-title">Warehouse Training</h3>

        <div id="training-body"></div>

        <div class="training-controls">
          <button type="button" id="training-prev-btn" class="training-nav-btn">⬅ Previous</button>
          <span id="training-progress">1 / 1</span>
          <button type="button" id="training-next-btn" class="training-nav-btn">Next ➡</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config/firebase.js"></script>
  <script src="js/firebaseDB.js"></script>
  <script src="js/pallet.js"></script>
  <script src="js/warehouse.js"></script>
  <script src="js/events.js"></script>
  <script src="js/training.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
